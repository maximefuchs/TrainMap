<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Train Map — Direct Connections in France</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <h1>🚄 <span>Train</span>Map</h1>

  <div class="search-wrap">
    <input
      id="station-input"
      type="text"
      placeholder="Search a French city or station…"
      autocomplete="off"
    />
    <div id="autocomplete"></div>
  </div>

  <input id="date-input" type="date" title="Schedule date" />

  <span id="status">Enter a city to explore connections</span>
</header>

<div id="progress-bar-wrap" hidden>
  <div id="progress-bar"></div>
</div>

<main>
  <aside id="sidebar">
    <div id="sidebar-header">Routes — <span id="conn-count">0</span></div>
    <div id="connections-list">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C7 2 3 6 3 11c0 5.25 9 13 9 13s9-7.75 9-13c0-5-4-9-9-9z"/>
          <circle cx="12" cy="11" r="3"/>
        </svg>
        <p>Search for a station above to see all cities reachable by direct train.</p>
      </div>
    </div>
  </aside>

  <div id="map"></div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
