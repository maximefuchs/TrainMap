<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Train Map — Direct Connections in France</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 20px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f8fafc;
      white-space: nowrap;
    }

    header h1 span { color: #38bdf8; }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 400px;
    }

    #station-input {
      width: 100%;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #475569;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #station-input:focus { border-color: #38bdf8; }
    #station-input::placeholder { color: #64748b; }

    #autocomplete {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      z-index: 9999;
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }

    .ac-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #1e293b;
      transition: background 0.15s;
    }
    .ac-item:hover { background: #0ea5e9; color: #fff; }
    .ac-item:last-child { border-bottom: none; }

    #status {
      font-size: 0.85rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    #status.error { color: #f87171; }
    #status.loading { color: #facc15; }
    #status.ok { color: #4ade80; }

    /* ── Main layout ─────────────────────────────────────────── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────── */
    #sidebar {
      width: 340px;
      flex-shrink: 0;
      background: #1e293b;
      border-right: 1px solid #334155;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 14px 16px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #64748b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }

    #connections-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .conn-item {
      padding: 12px 16px;
      border-bottom: 1px solid #0f172a;
      cursor: pointer;
      transition: background 0.15s;
    }
    .conn-item:hover { background: #0f172a; }
    .conn-item.active { background: #0c4a6e; border-left: 3px solid #38bdf8; }

    .conn-name {
      font-weight: 600;
      font-size: 0.92rem;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .conn-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .badge-dur  { background: #1d4ed8; color: #bfdbfe; }
    .badge-freq { background: #065f46; color: #a7f3d0; }
    .badge-line { background: #44337a; color: #d6bcfa; }
    .badge-time { background: #7c2d12; color: #fed7aa; }

    /* ── Map ─────────────────────────────────────────────────── */
    #map {
      flex: 1;
      z-index: 0;
    }

    /* Leaflet popup override */
    .leaflet-popup-content-wrapper {
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 10px;
      border: 1px solid #334155;
    }
    .leaflet-popup-tip { background: #1e293b; }
    .leaflet-popup-content { margin: 10px 14px; font-size: 0.88rem; line-height: 1.6; }
    .leaflet-popup-content strong { color: #38bdf8; }

    /* Route polyline tooltip */
    .route-tooltip {
      background: #1e293b;
      border: 1px solid #334155;
      color: #f1f5f9;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      box-shadow: none;
    }
    .route-tooltip::before { display: none; }

    /* ── Duration color scale legend ─────────────────────────── */
    #legend {
      position: absolute;
      bottom: 30px;
      right: 10px;
      z-index: 1000;
      background: rgba(30,41,59,0.92);
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 0.78rem;
      color: #94a3b8;
    }
    #legend strong { display: block; color: #f1f5f9; margin-bottom: 6px; }
    .legend-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* ── Empty state ─────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      gap: 8px;
      text-align: center;
      padding: 20px;
    }
    #empty-state svg { opacity: 0.3; }
    #empty-state p { font-size: 0.85rem; }
  </style>
</head>
<body>

<header>
  <h1>🚄 <span>Train</span>Map</h1>

  <div class="search-wrap">
    <input
      id="station-input"
      type="text"
      placeholder="Search a French city or station…"
      autocomplete="off"
    />
    <div id="autocomplete"></div>
  </div>

  <span id="status">Enter a city to explore connections</span>
</header>

<main>
  <aside id="sidebar">
    <div id="sidebar-header">Direct connections — <span id="conn-count">0</span> stations</div>
    <div id="connections-list">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C7 2 3 6 3 11c0 5.25 9 13 9 13s9-7.75 9-13c0-5-4-9-9-9z"/>
          <circle cx="12" cy="11" r="3"/>
        </svg>
        <p>Search for a station above to see all cities reachable by direct train.</p>
      </div>
    </div>
  </aside>

  <div id="map"></div>

  <div id="legend">
    <strong>Marker — travel time</strong>
    <div class="legend-row"><div class="legend-dot" style="background:#22c55e"></div> &lt; 1 h</div>
    <div class="legend-row"><div class="legend-dot" style="background:#eab308"></div> 1 – 2 h</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f97316"></div> 2 – 3 h</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ef4444"></div> 3 – 4 h</div>
    <div class="legend-row"><div class="legend-dot" style="background:#a855f7"></div> &gt; 4 h</div>
    <strong style="margin-top:10px;display:block;">Line — one color per route</strong>
  </div>
</main>

<script>
// ── Map setup ────────────────────────────────────────────────────────────────
const map = L.map("map", { center: [46.8, 2.3], zoom: 6 });

L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

// ── State ────────────────────────────────────────────────────────────────────
let originMarker = null;
let connectionMarkers = [];
let routePolylines = [];   // one Leaflet polyline per deduplicated route path
let selectedStation = null;
let activeConnItem = null;
let debounceTimer = null;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const input = document.getElementById("station-input");
const ac = document.getElementById("autocomplete");
const status = document.getElementById("status");
const connList = document.getElementById("connections-list");
const connCount = document.getElementById("conn-count");

// ── Route color palette (distinct, readable on dark map) ─────────────────────
const ROUTE_PALETTE = [
  "#38bdf8", // sky blue
  "#f472b6", // pink
  "#a78bfa", // violet
  "#34d399", // emerald
  "#fbbf24", // amber
  "#fb923c", // orange
  "#e879f9", // fuchsia
  "#4ade80", // green
  "#f87171", // red
  "#60a5fa", // blue
];

function routeColor(idx) {
  return ROUTE_PALETTE[idx % ROUTE_PALETTE.length];
}

// ── Duration → color (for markers only) ──────────────────────────────────────
function durationColor(min) {
  if (min < 60)  return "#22c55e";
  if (min < 120) return "#eab308";
  if (min < 180) return "#f97316";
  if (min < 240) return "#ef4444";
  return "#a855f7";
}

function fmtDuration(min) {
  const h = Math.floor(min / 60), m = min % 60;
  return h > 0 ? `${h}h${m > 0 ? m + "min" : ""}` : `${m} min`;
}

function circleIcon(color) {
  return L.divIcon({
    className: "",
    html: `<div style="
      width:14px;height:14px;border-radius:50%;
      background:${color};border:2px solid #fff;
      box-shadow:0 0 6px ${color}88;
    "></div>`,
    iconSize: [14, 14],
    iconAnchor: [7, 7],
  });
}

const originIcon = L.divIcon({
  className: "",
  html: `<div style="
    width:18px;height:18px;border-radius:50%;
    background:#38bdf8;border:3px solid #fff;
    box-shadow:0 0 12px #38bdf888;
  "></div>`,
  iconSize: [18, 18],
  iconAnchor: [9, 9],
});

// ── Autocomplete ─────────────────────────────────────────────────────────────
input.addEventListener("input", () => {
  clearTimeout(debounceTimer);
  const q = input.value.trim();
  if (q.length < 2) { ac.style.display = "none"; return; }
  debounceTimer = setTimeout(() => fetchSuggestions(q), 250);
});

input.addEventListener("blur", () => setTimeout(() => { ac.style.display = "none"; }, 150));
input.addEventListener("focus", () => { if (ac.innerHTML) ac.style.display = "block"; });

async function fetchSuggestions(q) {
  try {
    const r = await fetch(`/api/stations?q=${encodeURIComponent(q)}`);
    const data = await r.json();
    if (!r.ok) { showStatus(data.detail || "API error", "error"); return; }
    renderSuggestions(data.stations || []);
  } catch (e) {
    showStatus("Network error", "error");
  }
}

function renderSuggestions(stations) {
  if (!stations.length) { ac.style.display = "none"; return; }
  ac.innerHTML = stations.map(s =>
    `<div class="ac-item" data-id="${s.id}" data-name="${s.name}" data-lat="${s.lat}" data-lon="${s.lon}">
      ${s.name}
    </div>`
  ).join("");
  ac.style.display = "block";

  ac.querySelectorAll(".ac-item").forEach(el => {
    el.addEventListener("mousedown", () => {
      selectStation({
        id: el.dataset.id,
        name: el.dataset.name,
        lat: parseFloat(el.dataset.lat),
        lon: parseFloat(el.dataset.lon),
      });
      input.value = el.dataset.name;
      ac.style.display = "none";
    });
  });
}

// ── Select station & load connections ────────────────────────────────────────
async function selectStation(station) {
  selectedStation = station;
  clearMap();

  // Place origin marker
  originMarker = L.marker([station.lat, station.lon], { icon: originIcon, zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup(`<strong>${station.name}</strong><br>Origin station`);

  map.setView([station.lat, station.lon], 7, { animate: true });

  showStatus("Loading connections…", "loading");
  connList.innerHTML = `<div id="empty-state"><p>Loading…</p></div>`;
  connCount.textContent = "0";

  try {
    const r = await fetch(`/api/connections?station_id=${encodeURIComponent(station.id)}`);
    const data = await r.json();
    if (!r.ok) { showStatus(data.detail || "API error", "error"); return; }

    const conns = data.connections || [];
    const paths = data.route_paths || [];
    showStatus(`${conns.length} direct connections found`, "ok");
    connCount.textContent = conns.length;
    renderConnections(station, conns, paths);
  } catch (e) {
    console.error("selectStation error:", e);
    showStatus(`Error: ${e.message}`, "error");
  }
}
function renderConnections(origin, conns, paths) {
  if (!conns.length) {
    connList.innerHTML = `<div id="empty-state"><p>No direct train connections found.</p></div>`;
    return;
  }

  // Draw one polyline per route path (connecting all stops of the same train in order)
  paths.forEach((path, idx) => {
    const color = routeColor(idx);
    const latlngs = path.stops.map(s => [s.lat, s.lon]);

    const poly = L.polyline(latlngs, {
      color,
      weight: 3,
      opacity: 0.75,
    }).addTo(map);

    poly.bindTooltip(path.line_code || "Train", {
      sticky: true,
      className: "route-tooltip",
    });

    // Highlight on hover
    poly.on("mouseover", () => poly.setStyle({ weight: 5, opacity: 1 }));
    poly.on("mouseout",  () => poly.setStyle({ weight: 3, opacity: 0.75 }));

    routePolylines.push(poly);
  });

  // Draw destination markers (color = travel duration from origin)
  conns.forEach((c, idx) => {
    const color = durationColor(c.duration_min);
    const marker = L.marker([c.lat, c.lon], { icon: circleIcon(color) })
      .addTo(map)
      .bindPopup(buildPopup(c));
    connectionMarkers.push({ marker, conn: c, idx });
    marker.on("click", () => highlightItem(idx));
  });

  // Sidebar list
  connList.innerHTML = conns.map((c, idx) => {
    const color = durationColor(c.duration_min);
    const lines = c.lines.slice(0, 4).map(l =>
      `<span class="badge badge-line">${l}</span>`
    ).join("");
    const timeInfo = (c.first_departure && c.last_departure)
      ? `<span class="badge badge-time">⏱ ${c.first_departure} → ${c.last_departure}</span>`
      : "";
    const freq = c.frequency
      ? `<span class="badge badge-freq">${c.frequency} trains/day</span>`
      : "";

    return `
      <div class="conn-item" data-idx="${idx}" onclick="highlightItem(${idx})">
        <div class="conn-name">
          <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${color};margin-right:6px;vertical-align:middle;"></span>
          ${c.name}
        </div>
        <div class="conn-meta">
          <span class="badge badge-dur">${fmtDuration(c.duration_min)}</span>
          ${freq}
          ${timeInfo}
          ${lines}
        </div>
      </div>`;
  }).join("");
}

function buildPopup(c) {
  const lines = c.lines.join(", ") || "—";
  const time = (c.first_departure && c.last_departure)
    ? `${c.first_departure} → ${c.last_departure}`
    : "—";
  return `
    <strong>${c.name}</strong><br>
    Duration: ${fmtDuration(c.duration_min)}<br>
    Trains/day: ${c.frequency || "—"}<br>
    First → Last: ${time}<br>
    Lines: ${lines}
  `;
}

// ── Highlight on click ────────────────────────────────────────────────────────
function highlightItem(idx) {
  // Sidebar
  if (activeConnItem) activeConnItem.classList.remove("active");
  const el = connList.querySelector(`[data-idx="${idx}"]`);
  if (el) {
    el.classList.add("active");
    el.scrollIntoView({ block: "nearest" });
    activeConnItem = el;
  }
  // Map
  const found = connectionMarkers.find(m => m.idx === idx);
  if (found) {
    found.marker.openPopup();
    map.panTo(found.marker.getLatLng(), { animate: true });
  }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function clearMap() {
  if (originMarker) { map.removeLayer(originMarker); originMarker = null; }
  connectionMarkers.forEach(({ marker }) => map.removeLayer(marker));
  connectionMarkers = [];
  routePolylines.forEach(p => map.removeLayer(p));
  routePolylines = [];
  activeConnItem = null;
}

function showStatus(msg, type = "") {
  status.textContent = msg;
  status.className = type;
}
</script>
</body>
</html>
