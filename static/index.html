<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrainMap — Direct train connections</title>
  <meta name="description" content="Explore all cities reachable by direct train from any station. Live schedules powered by the Navitia API." />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph — controls how the link looks when shared on social media / messaging apps -->
  <meta property="og:type"        content="website" />
  <meta property="og:title"       content="TrainMap — Direct train connections" />
  <meta property="og:description" content="Explore all cities reachable by direct train from any station. Live schedules powered by the Navitia API." />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚄</text></svg>" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<header>
  <h1>🚄 <span>Train</span>Map</h1>

  <div id="country-toggle">
    <select id="country-select" aria-label="Country">
      <option value="fr">🇫🇷 France</option>
      <option value="it">🇮🇹 Italy</option>
    </select>
  </div>

  <div class="search-wrap">
    <input
      id="station-input"
      type="text"
      placeholder="Search a city or station…"
      autocomplete="off"
    />
    <div id="autocomplete"></div>
  </div>

  <div id="date-wrap">
    <input id="date-input" type="date" title="Schedule date" />
  </div>

  <span id="status">Enter a city to explore connections</span>

  <div id="lang-toggle">
    <select id="lang-select" aria-label="Language">
      <option value="en">🌐 EN</option>
      <option value="fr">🌐 FR</option>
    </select>
  </div>
</header>

<div id="progress-bar-wrap" hidden>
  <div id="progress-bar"></div>
</div>

<main>
  <!-- Mobile fab to open the sidebar panel -->
  <button id="sidebar-fab" aria-label="Show routes">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="6"  x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
    <span id="fab-count">0</span>
  </button>

  <aside id="sidebar">
    <!-- Drag handle (mobile only) -->
    <div id="sidebar-handle"></div>
    <div id="sidebar-header">
      <span id="sidebar-label">Routes</span> — <span id="conn-count">0</span>
      <button id="sidebar-close" aria-label="Close">✕</button>
    </div>
    <div id="connections-list">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M12 2C7 2 3 6 3 11c0 5.25 9 13 9 13s9-7.75 9-13c0-5-4-9-9-9z"/>
          <circle cx="12" cy="11" r="3"/>
        </svg>
        <p id="empty-state-text">Search for a station above to see all cities reachable by direct train.</p>
      </div>
    </div>
  </aside>

  <div id="map"></div>

  <!-- Backdrop for mobile sidebar -->
  <div id="sidebar-backdrop"></div>
</main>

<script src="/static/i18n.js"></script>
  <script src="/static/map.js"></script>
  <script src="/static/sidebar.js"></script>
  <script src="/static/autocomplete.js"></script>
  <script src="/static/routes.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
